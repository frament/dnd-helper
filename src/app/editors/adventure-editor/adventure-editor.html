<div class="bg-gray-800 rounded-lg p-6 h-full flex flex-col">
  @if (_inited()){
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 overflow-auto">
      <!-- Левая колонка: Основные настройки -->
      <div>
        <div class="bg-gray-900 p-5 rounded-xl mb-6">
          <h3 class="text-lg font-semibold text-white mb-4">Основные параметры</h3>

          <!-- Название приключения -->
          <div class="mb-4">
            <label class="block text-gray-400 mb-2">Название приключения</label>
            <input pInputText class="w-full"
                   [(ngModel)]="sig['name']"
                   placeholder="Введите название приключения">
          </div>
          <!-- Тип приключения -->
          <div class="mb-4">
            <label class="block text-gray-400 mb-2">Тип приключения</label>
            <p-select [options]="adventureTypeOptions"
                      [(ngModel)]="sig['adventureType']"
                      placeholder="Выберите тип"
                      class="w-full"/>
          </div>

          <!-- Описание приключения -->
          <div class="mb-4">
            <label class="block text-gray-400 mb-2">Описание приключения</label>
            <textarea pTextarea class="w-full"
                      [(ngModel)]="sig['description']"
                      [rows]="3"
                      placeholder="Добавьте описание приключения..."></textarea>
          </div>

          <!-- Теги приключения -->
          <div class="mb-4">
            <label class="block text-gray-400 mb-2">Теги приключения</label>
            <p-autoComplete multiple [(ngModel)]="sig['tags']" #tags
                            [typeahead]="false"
                            placeholder="Добавьте теги..."
                            class="w-full"/>
            <div class="mt-2">
              @for (tag of popularTags; track tag){
                <p-tag [value]="tag"
                       class="mr-2 mb-2 cursor-pointer"
                       (click)="addTag(tag)"
                       [rounded]="true"/>
              }
            </div>
          </div>

          <!-- Видимость приключения -->
          <div>
            <label class="block text-gray-400 mb-2">Видимость приключения</label>
            <p-toggleswitch [(ngModel)]="sig['isPublic']"/>
            <span class="ml-3 text-gray-400">
            {{sig['isPublic']() ? 'Публичное' : 'Приватное'}}
          </span>
          </div>

        </div>
      </div>

      <!-- Правая колонка: Дополнительные настройки -->
      <div>
        <!-- Обложка приключения -->
        <div class="bg-gray-900 p-5 rounded-xl mb-6">
          <h3 class="text-lg font-semibold text-white mb-4">Обложка приключения</h3>

          <div class="flex flex-col items-center">
            <!-- Предпросмотр обложки -->
            <div class="relative mb-4">
              @if (image.value()) {
                <img [src]="image.value()"
                     alt="Обложка приключения"
                     class="w-64 h-96 object-cover rounded-lg border-2 border-amber-500">
              } @else {
                <div class="bg-gray-800 border-2 border-dashed border-amber-500
                           rounded-lg w-64 h-96 flex items-center justify-center">
                  <i class="pi pi-image text-4xl text-amber-500"></i>
                </div>
              }

              <!-- Индикатор загрузки -->
              @if (uploading()) {
                <p-progressSpinner class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"
                                   strokeWidth="4"
                                   animationDuration=".5s"/>
              }
            </div>

            <!-- Кнопки управления изображением -->
            <div class="flex flex-wrap justify-center gap-2">
              <button pButton
                      class="p-button-success"
                      (click)="fileInput.click()">
                <i class="pi pi-upload" pButtonIcon></i>
                <span pButtonLabel>Загрузить обложку</span>
              </button>
              <input #fileInput type="file" accept="image/*"
                     class="hidden"
                     (change)="onFileSelected($event)">

              @if (image.value()) {
                <button pButton
                        class="p-button-danger"
                        (click)="removeImage()">
                  <i class="pi pi-trash" pButtonIcon></i>
                  <span pButtonLabel>Удалить</span>
                </button>
              }
            </div>

            <!-- Информация об изображении -->
            <div class="mt-4 text-center text-sm text-gray-400">
              <p>Рекомендуемый размер: 800×1200 пикселей</p>
              <p>Форматы: JPG, PNG, WebP</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  }
</div>
